site_name: h2mare
site_description: Geospatial processing pipeline for climate and ocean data
site_author: Hugo Parra
site_url: https://h2ugoparra.github.io/h2mare/
repo_url: https://github.com/h2ugoparra/h2mare
repo_name: h2ugoparra/h2mare

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Architecture: architecture.md
  - CLI Reference: cli.md
  - Variables: variables.md
  - API:
    - Overview: api/index.md
    - Downloaders: api/downloader.md
    - Compiler: api/compiler.md
    - ZarrCatalog: api/zarr_catalog.md
    - Extractor: api/extractor.md
    - ParquetIndexer: api/parquet_indexer.md
    - ParquetPlotter: api/parquet_plotter.md
    - parquet2csv: api/parquet2csv.md
    - Ad-hoc converters: api/adhoc_converters.md
