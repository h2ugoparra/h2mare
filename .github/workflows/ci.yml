name: CI

on:
  pull_request:
    branches: [dev, main]

jobs:
  # Required gate: every commit in the PR must follow Conventional Commits.
  commit-lint:
    name: commit-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commit messages
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          pattern='^(feat|fix|docs|chore|perf|refactor|style|test|build|ci|revert)(\(.+\))?!?: .+'
          fail=0
          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            case "$msg" in
              "Merge "*) continue ;;
            esac
            if ! printf '%s' "$msg" | grep -Eq "$pattern"; then
              echo "::error::Non-conventional commit message: $msg"
              fail=1
            fi
          done < <(git log --format=%s --no-merges "$base..$head")
          if [ "$fail" -ne 0 ]; then
            echo "Commit messages must follow Conventional Commits (feat:, fix:, docs:, chore:, perf:, refactor:)."
            exit 1
          fi

  # Required gate on dev PRs only: feature branches must use an approved prefix.
  branch-name:
    name: branch-name
    if: github.base_ref == 'dev'
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          branch='${{ github.head_ref }}'
          if ! printf '%s' "$branch" | grep -Eq '^(feature|fix|docs|chore|perf|refactor)/.+'; then
            echo "::error::Branch '$branch' must start with feature/, fix/, docs/, chore/, perf/, or refactor/."
            exit 1
          fi

  # Informational quality job (not a required gate by default — promote it in
  # branch protection once you confirm it is reliably green).
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: uv sync --dev
      - run: uv run ruff check h2mare/ tests/
      - run: uv run pytest tests/
